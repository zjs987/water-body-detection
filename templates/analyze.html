<script>
    // 预览上传的图片
    function previewImage(input, previewDiv) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            previewDiv.style.background = '#f8f9fa';
            previewDiv.style.borderRadius = '10px';

            reader.onload = function (e) {
                previewDiv.innerHTML = `
                    <img src="${e.target.result}"
                         style="max-width:100%;
                                max-height:200px;
                                border-radius:8px;
                                box-shadow:0 3px 10px rgba(0,0,0,0.1);
                                animation: fadeIn 0.5s ease">
                `;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('beforeImage').addEventListener('change', function () {
        previewImage(this, document.getElementById('beforePreview'));
    });

    document.getElementById('afterImage').addEventListener('change', function () {
        previewImage(this, document.getElementById('afterPreview'));
    });

    // Markdown 渲染函数
    function renderMarkdown(text) {
        if (!text) return '';

        // 使用marked.js库来渲染Markdown
        const renderer = new marked.Renderer();

        // 配置marked选项
        marked.setOptions({
            renderer: renderer,
            highlight: function(code, lang) {
                return code;
            },
            pedantic: false,
            gfm: true,
            breaks: true,
            sanitize: false,
            smartypants: false,
            xhtml: false
        });

        return marked.parse(text);
    }

    // 当前日期时间格式化函数
    function formatDateTime() {
        const now = new Date();
        const options = {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        };
        return now.toLocaleDateString('en-US', options);
    }

    // 提交表单
    document.getElementById('uploadForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const errorMessage = document.getElementById('errorMessage');
        const selectedModel = document.getElementById('modelSelect').value;

        // 显示加载动画，隐藏结果和错误
        loading.style.display = 'block';
        resultContainer.style.display = 'none';
        errorMessage.style.display = 'none';

        fetch('/analyze', {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.error || '请求失败');
                    });
                }
                return response.json();
            })
            .then(data => {
                // 隐藏加载动画，显示结果
                loading.style.display = 'none';
                resultContainer.style.display = 'block';

                // 显示图像
                document.getElementById('beforeImageResult').src = '/' + data.before_image;
                document.getElementById('afterImageResult').src = '/' + data.after_image;

                // 设置PDF导出用的图像
                document.getElementById('pdfBeforeImage').src = '/' + data.before_image;
                document.getElementById('pdfAfterImage').src = '/' + data.after_image;

                // 设置报告元数据
                const reportDate = formatDateTime();
                document.getElementById('reportDate').textContent = reportDate;
                document.getElementById('reportModel').textContent = selectedModel;
                document.getElementById('pdfReportDate').textContent = reportDate;
                document.getElementById('pdfReportModel').textContent = selectedModel;

                // 使用Markdown渲染分析结果
                const analysisResult = document.getElementById('analysisResult');
                analysisResult.innerHTML = renderMarkdown(data.analysis);

                // 同时也为PDF准备内容
                document.getElementById('pdfAnalysisResult').innerHTML = renderMarkdown(data.analysis);
            })
            .catch(error => {
                // 隐藏加载动画，显示错误信息
                loading.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.textContent = `分析失败: ${error.message}`;
            });
    });

   document.getElementById('exportPdfBtn').addEventListener('click', function() {
    const element = document.getElementById('reportForPdf');

    // 简化样式设置
    element.style.display = 'block';
    element.style.margin = '0';
    element.style.padding = '0';
    element.style.width = '100%';

    // 确保分析结果已经正确复制到PDF容器中
    const analysisResult = document.getElementById('analysisResult').innerHTML;
    document.getElementById('pdfAnalysisResult').innerHTML = analysisResult;

    const opt = {
    margin:       0, // 完全消除页边距
    filename:     'water_body_analysis_report.pdf',
    image:        { type: 'jpeg', quality: 0.95 },
    html2canvas:  {
        scale: 2,
        useCORS: true,
        logging: true,
        scrollY: 0, // 消除滚动偏移
        ignoreElements: (element) => element.id === 'exportPdfBtn'
    },
    jsPDF:        {
        unit: 'mm',
        format: 'a4',
        orientation: 'portrait',
        compress: true
    }
};

// 在导出前强制重置样式
element.style.padding = '0';
element.style.margin = '0';
document.querySelectorAll('#reportForPdf *').forEach(el => {
    el.style.margin = '0 !important';
    el.style.padding = '0 !important';
});

    // 显示导出进度
    const errorMessage = document.getElementById('errorMessage');
    errorMessage.style.display = 'block';
    errorMessage.style.color = '#f39c12';
    errorMessage.textContent = 'Generating PDF, please wait... ';

    // 导出PDF
    html2pdf().set(opt).from(element).save().then(() => {
        // 恢复原始状态
        element.style.display = 'none';
        element.style.margin = '';
        element.style.padding = '';
        element.style.width = '';

        errorMessage.style.color = '#2ecc71';
        errorMessage.textContent = 'PDF export success';

        // 3秒后隐藏消息
        setTimeout(() => {
            errorMessage.style.display = 'none';
        }, 3000);
    }).catch(error => {
        element.style.display = 'none';
        element.style.margin = '';
        element.style.padding = '';
        element.style.width = '';

        errorMessage.style.color = '#e74c3c';
        errorMessage.textContent = `Fail to export PDF: ${error.message}`;
    });
});
    // 测试代理连接
    document.getElementById('testProxyBtn').addEventListener('click', function () {
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.style.display = 'none';

        fetch('/test_proxy')
            .then(response => response.json())
            .then(data => {
                errorMessage.style.display = 'block';
                if (data.status === 'success') {
                    errorMessage.style.color = '#198754';
                    errorMessage.textContent = '代理连接测试成功！';
                } else {
                    errorMessage.style.color = '#dc3545';
                    errorMessage.textContent = `代理连接测试失败: ${data.message}`;
                }
            })
            .catch(error => {
                errorMessage.style.display = 'block';
                errorMessage.style.color = '#dc3545';
                errorMessage.textContent = `代理连接测试失败: ${error.message}`;
            });
    });

    // 动态加载可用模型
    fetch('/models')
        .then(response => response.json())
        .then(data => {
            if (data.models && data.models.length > 0) {
                const modelSelect = document.getElementById('modelSelect');
                modelSelect.innerHTML = '';

                data.models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name;
                    if (model.id === 'gpt-4o') {
                        option.selected = true;
                    }
                    modelSelect.appendChild(option);
                });
            }
        })
        .catch(error => {
            console.error('加载模型列表失败:', error);
        });
</script>


<script>
    // 仅修改预览功能增加动画
    function previewImage(input, previewDiv) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            previewDiv.style.background = '#f8f9fa';
            previewDiv.style.borderRadius = '10px';

            reader.onload = function (e) {
                previewDiv.innerHTML = `
                    <img src="${e.target.result}"
                         style="max-width:100%;
                                max-height:200px;
                                border-radius:8px;
                                box-shadow:0 3px 10px rgba(0,0,0,0.1);
                                animation: fadeIn 0.5s ease">
                `;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
