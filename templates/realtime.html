<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="InsoAi - AI Writing, Video, and Image Generator HTML5 Template">
    <meta name="keywords" content="AI, user-interface, data-visualization, Modern, innovation, innovative, nft, crypto-currency">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Insomniacafe">
    <title>InsoAi - AI Writing, Video, and Image Generator HTML5 Template</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo/favicon.ico') }}">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <!-- normalize css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/normalize.css') }}">
    <!-- slick slider css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slick-theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/slick.css') }}">
    <!-- cursor css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cursor.css') }}">
    <!-- animate css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animate.min.css') }}">
    <!-- Nice select css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nice-select.css') }}">
    <!-- fontawesome css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fontawesome.min.css') }}">
    <!-- modal video css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modal-video.min.css') }}">
    <!-- popup video css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/video-css.css') }}">
    <!-- meanmenu css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/meanmenu.min.css') }}">
    <!-- style css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- 高德地图 API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=2b20f7c64bc0c7211df7b93e186d2e13&plugin=AMap.PolygonEditor"></script>
    <script src="https://a.amap.com/jsapi_demos/static/demo-center/js/demoutils.js"></script>

    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
        <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<style>
    .prompt__box .prompt-btn {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        border: 0;
        background: #3f3eed;
        color: #fff;
        font-weight: 600;
        font-size: 30px;
        -webkit-transition: all 0.3s ease-in;
        -moz-transition: all 0.3s ease-in;
        -ms-transition: all 0.3s ease-in;
        -o-transition: all 0.3s ease-in;
        transition: all 0.3s ease-in;
    }

    .prompt__box .prompt-btn:hover {
        background: var(--g-2);
        color: var(--sc);
    }

    .my-map {
        margin: 0 auto;
        width: 650px;
        height: 650px;
    }

    .my-map .icon {
        background: url(//a.amap.com/lbs-dev-yuntu/static/web/image/tools/creater/marker.png) no-repeat;
    }

    .amap-container {
        height: 100%;
    }

    .myinfowindow {
        width: 240px;
        min-height: 50px;
    }

    .myinfowindow h5 {
        height: 20px;
        line-height: 20px;
        overflow: hidden;
        font-size: 14px;
        font-weight: bold;
        width: 220px;
        text-overflow: ellipsis;
        word-break: break-all;
        white-space: nowrap;
    }

    .myinfowindow div {
        margin-top: 10px;
        min-height: 40px;
        line-height: 20px;
        font-size: 13px;
        color: #6f6f6f;
    }

    /* 新增样式 */
    .contact__info {
        display: flex;
        flex-direction: column;
        justify-content: center; /* 垂直居中 */
        align-items: center; /* 水平居中 */
        height: 100%; /* 撑满父容器高度 */
        width: 50%;
        float: left;
    }

    .map-container {
        float: right;
        width: 50%;
    }

    .clearfix::after {
        content: "";
        clear: both;
        display: table;
    }

    .detect-instruction {
        font-size: 24px; /* 更大的字体 */
        color: white; /* 白色文字 */
        margin-bottom: 20px;
        font-weight: 500; /* 稍微加粗 */
        text-align: center; /* 文字居中 */
    }

    /* 确保容器高度撑满 */
    .contact {
        display: flex;
        align-items: center; /* 垂直居中 */
        min-height: 100vh; /* 撑满整个视口高度 */
    }
</style>
<body class="page-template">

    <!-- header menu -->
    <header class="header">
        <div class="container">
            <div class="row">
                <div class="header__wrapper">
                    <div class="header__logo" style="width: 400px; height: 100px;">
                        <div style="display: inline-block; line-height: 100px;">
                            <a href="index.html">
                                <img src="{{ url_for('static', filename='img/logo/logo.png') }}" height="70px" alt="Logo"/>
                            </a>
                        </div>
                        <div style="display: inline-block; line-height: 100px;">
                            <a href="index.html" style="font-size: 40px; font-weight: bold;">HydroNet</a>
                        </div>
                    </div>
                    <div class="header__menu">
                        <nav Id="offcanvase__menu">
                        </nav>
                    </div>
                    <div class="header__right">
                        <div class="header__right--btn">
                            <a class="signup" href="/index">Back <i class="fa-thin fa-arrow-right"></i></a>
                        </div>
                        <button class="menu-icon d-md-block d-lg-none">
                            <i class="fa-sharp fa-solid fa-bars"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- header menu end -->
    <!-- breadcrumb -->
    <div class="inso-breadcrumb pt-90 pb-90">
        <div class="container position-relative">
            <div class="row">
                <div class="inso-breadcrumb__images animated">
                    <img src="{{ url_for('static', filename='img/animated-icon/3-line.png') }}" alt="">
                    <img src="{{ url_for('static', filename='img/animated-icon/star-icon.png') }}" alt="">
                    <img src="{{ url_for('static', filename='img/animated-icon/trival.svg') }}" alt="">
                </div>
                <div class="col-12 text-center">
                    <div class="inso-breadcrumb__title">
                        <h2 style="color: aliceblue;">Real-time Detection</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- breadcrumb end -->
    <!-- contact -->
    <section class="contact pt-110 pb-110">
        <div class="container">
            <div class="row clearfix"> <!-- 添加 clearfix 类 -->
                <div class="col-lg-6 mb-40 contact__info">
                    <div class="detect-instruction">
                        Click to detect water bodies in the current map view.
                    </div>
                    <div class="prompt__box">
                        <a href="/upload">
                            <button type="submit" class="prompt-btn" id="upload-button">
                                Detect
                                <i class="fa-sharp fa-light fa-arrow-right-long"></i>
                            </button>
                        </a>
                    </div>
                </div>
                <div class="col-lg-6 mb-110 map-container"> <!-- 添加 map-container 类 -->
                    <div class="my-map">
                        <div id="mymap"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- contact end -->

    <!-- back to top -->
    <div class="scroll active-scroll">
        <svg class="scroll__circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
            <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"
                style="transition: stroke-dashoffset 10ms linear 0s; stroke-dasharray: 307.919px, 307.919px; stroke-dashoffset: 244.073px;">
            </path>
        </svg>
    </div>
    <!-- back to top end -->

    <!-- all jquery plugins here -->
    <!-- jquery -->
    <script src="{{ url_for('static', filename='js/Jquery-3.7.0.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ajax-contact.js') }}"></script>
    <!-- bootstrap- jquery included -->
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
    <!-- slick slider- jquery included -->
    <script src="{{ url_for('static', filename='js/slick.min.js') }}"></script>
    <!-- niceselect - jquery included -->
    <script src="{{ url_for('static', filename='js/jquery.nice-select.min.js') }}"></script>
    <!-- imageloaded pkgd - jquery included -->
    <script src="{{ url_for('static', filename='js/imagesloaded.pkgd.min.js') }}"></script>
    <!-- appear - jquery included -->
    <script src="{{ url_for('static', filename='js/appear.min.js') }}"></script>
    <!-- modal video - jquery included -->
    <script src="{{ url_for('static', filename='js/jquery-modal-video.min.js') }}"></script>
    <!-- meamenu - jquery inclued -->
    <script src="{{ url_for('static', filename='js/jquery.meanmenu.min.js') }}"></script>
    <!-- video js - jquery included -->
    <script src="{{ url_for('static', filename='js/video.js') }}"></script>
    <!-- cursor js - jquery included -->
    <script src="{{ url_for('static', filename='js/cursor.js') }}"></script>
    <!-- ajax contact js -->
    <!-- main js -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script type="text/javascript">
        var map = new AMap.Map("mymap", {
            center: [103.98511, 30.765011],
            layers: [new AMap.TileLayer.Satellite()],
            zoom: 18
        });

        var path2 = [
            [103.976199, 30.767975],
            [103.979315, 30.769676],
            [103.979975, 30.770841],
            [103.98134, 30.771241],
            [103.98309, 30.771451],
            [103.983619, 30.771765],
            [103.984759, 30.771031],
            [103.984962, 30.769562],
            [103.985532, 30.769107],
            [103.989807, 30.770646],
            [103.991109, 30.768058],
            [103.992046, 30.767638],
            [103.994122, 30.768198],
            [103.996564, 30.762041],
            [103.993796, 30.761272],
            [103.986247, 30.755437]
        ];
        var polygon2 = new AMap.Polygon({
            path: path2,
            fillColor: null
        });

        map.add(polygon2);
        map.setFitView();
    </script>

</body>
</html>
